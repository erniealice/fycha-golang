{{define "report-dimension-toolbar-prefix"}}
<div class="report-header-actions">
    <button type="button" class="btn btn-primary"
            data-testid="report-filters-open-btn"
            aria-controls="sheetContent"
            aria-haspopup="dialog"
            hx-get="{{.FilterSheetURL}}"
            hx-target="#sheetContent"
            hx-swap="innerHTML"
            hx-push-url="false"
            onclick="Sheet.open('Filters')">
        {{template "icon-filter"}}
        <span>Filters</span>
        {{if .ActiveFilterCount}}
        <span class="filter-count-badge">{{.ActiveFilterCount}}</span>
        {{end}}
    </button>
</div>
<div class="rr-active-filters">
    <span class="rr-chip" data-testid="rr-chip-primary">
        <span class="rr-chip-label">{{.PrimaryLabel}}</span>
        <span class="rr-chip-value">{{.PrimaryValue}}</span>
    </span>
    <span class="rr-chip-sep">&times;</span>
    <span class="rr-chip" data-testid="rr-chip-rows">
        <span class="rr-chip-label">{{.RowsLabel}}</span>
        <span class="rr-chip-value">{{.RowsValue}}</span>
    </span>
</div>
{{end}}
